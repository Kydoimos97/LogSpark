site_name: LogSpark
site_url: !ENV READTHEDOCS_CANONICAL_URL
site_description: Simple, explicit logging for Python applications
site_author: Willem van der Schans

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Concepts:
    - Design Overview: design-overview.md
    - Logging Policy: logging-policy.md
    - Incremental Adoption: incremental-adoption.md
  - Usage:
    - Development Workflows: development-workflows.md
    - Production Observability: production-observability.md
    - Global Log Control: global-log-control.md
  - API Reference:
    - SparkLogger: api/spark-logger.md
    - LogManager: api/log-manager.md
    - LogOverride: api/log-override.md
    - Handlers: api/handlers.md
    - Types: api/types.md



extra_css:
  - assets/stylesheets/mkdocstrings-sections.css

theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/bolt.svg
  icon:
    logo: material/lightning-bolt
    favicon: material/lightning-bolt
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - navigation.path
    - toc.integrate           # integrates toc into sidebar
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.footer
    - search.highlight
    - search.suggest
  palette:
    scheme: slate
    primary: amber
    accent: yellow
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  highlightjs: false
  codehilite:
    guess_lang: false

plugins:
  - search
  - git-revision-date-localized:
      timezone: UTC
      type: iso_date
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_section_style: table
            show_if_no_docstring: false
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            group_by_category: true
            heading_level: 3
            show_bases: true
            line_length: 100
            show_docstring_description: true
            filters:
              - "!^_"
              - "!^__"
              - "!^__all__$"
              - "!^__version__$"
              - "!^__author__$"
            show_submodules: true
            show_symbol_type_heading: true
            summary: true
            parameter_headings: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
      linenums: true
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.magiclink
  - pymdownx.keys
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Kydoimos97/logspark
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/logspark/
repo_url: https://github.com/Kydoimos97/logspark
repo_name: Kydoimos97/logspark
edit_uri: edit/main/docs/
